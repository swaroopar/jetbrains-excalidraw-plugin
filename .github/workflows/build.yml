name: Build Plugin

# C2: build the plugin and publish the distribution zip as a downloadable
# workflow artifact so a maintainer can install it for manual testing without
# building locally. Triggers on push, pull request, and manual dispatch.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # GitHub-hosted Linux runners may strip the executable bit on a
      # repo-committed wrapper; ensure gradlew is runnable.
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Run the test suite on every push/PR. buildPlugin alone does NOT run tests
      # (the IntelliJ 'buildPlugin' task does not depend on 'test'), so without this
      # step CI would compile but never execute the tests — failures would only
      # surface later in the release workflow.
      - name: Run tests
        run: ./gradlew test --no-configuration-cache

      # No -PlocalIdePath here: CI resolves the WebStorm SDK remotely via the
      # platformVersion declared in gradle.properties (see build.gradle.kts).
      - name: Build plugin
        run: ./gradlew buildPlugin --no-configuration-cache

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: error
