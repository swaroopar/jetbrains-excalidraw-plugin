name: Release

# Manually-triggered release. Pick the semantic bump (major / minor / maintenance);
# the job runs the tests, computes the next version from the latest release tag,
# builds the plugin at that version, creates an annotated tag and a GitHub Release
# whose assets are the plugin distribution zip and the generated changelog.
#
# This workflow NEVER pushes to the (protected) main branch: the version is injected
# into the build via -PpluginVersion, and the git tag is the source of truth for the
# released version. So `main` is only ever updated through pull requests.
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Which part of the version to bump for this release"
        required: true
        type: choice
        default: minor
        options:
          - major          # X+1.0.0  — breaking changes
          - minor          # X.Y+1.0  — new features
          - maintenance    # X.Y.Z+1  — bug-fix / maintenance (patch)

permissions:
  contents: write   # push the tag and create the release (NOT the main branch)

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0          # full history for changelog + tag discovery

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Regular tests must pass before anything is tagged or released.
      - name: Run tests
        run: ./gradlew test --no-configuration-cache

      - name: Compute next version
        id: ver
        run: |
          # Current released version = latest v* tag; fall back to gradle.properties.
          prev_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -n "$prev_tag" ]; then
            current="${prev_tag#v}"
          else
            current=$(grep -E '^pluginVersionFallback=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          fi
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.release_type }}" in
            major)       major=$((major + 1)); minor=0; patch=0 ;;
            minor)       minor=$((minor + 1)); patch=0 ;;
            maintenance) patch=$((patch + 1)) ;;
            *) echo "Unknown release_type '${{ inputs.release_type }}'"; exit 1 ;;
          esac
          next="${major}.${minor}.${patch}"
          {
            echo "prev_tag=$prev_tag"
            echo "next=$next"
            echo "tag=v$next"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing ${current} -> ${next} (tag v${next}, type=${{ inputs.release_type }})"

      - name: Generate changelog
        run: |
          prev="${{ steps.ver.outputs.prev_tag }}"
          if [ -n "$prev" ]; then range="${prev}..HEAD"; else range=""; fi
          {
            echo "## ${{ steps.ver.outputs.tag }}"
            echo
            if [ -n "$prev" ]; then echo "Changes since ${prev}:"; else echo "Initial release."; fi
            echo
            git log $range --no-merges --pretty=format:'- %s (%h)'
            echo
          } > CHANGELOG.md
          echo "----- CHANGELOG.md -----"; cat CHANGELOG.md

      - name: Build plugin
        # Inject the version via -P so no version-bump commit is pushed to main; the tag
        # is the source of truth. Locally (no -P) build.gradle.kts derives the next-patch
        # -SNAPSHOT from the latest tag; pluginVersionFallback is only the no-git fallback.
        run: ./gradlew buildPlugin -PpluginVersion=${{ steps.ver.outputs.next }} --no-configuration-cache

      - name: Create tag
        run: |
          git config user.name "Swaroop AR"
          git config user.email "swaroop.ar@outlook.com"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            build/distributions/*.zip \
            CHANGELOG.md \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file CHANGELOG.md
