name: Claude Apply CI Fix

# Triggered by a comment on a PR containing the trigger phrase
# "@claude apply fix" — the approval step for claude-fix-ci.yml's suggestions:
# instead of the author clicking "Commit suggestion" on a single-block fix,
# this lets them approve a fix (including multi-file ones claude-fix-ci.yml
# could only describe, not suggest) and have Claude push it directly. Claude
# then:
#   1. acknowledges on the PR that it's starting,
#   2. checks out the PR's OWN branch (not a new one — this amends the
#      existing PR, unlike claude-implement.yml which opens a fresh PR),
#   3. looks for the fix claude-fix-ci.yml already proposed on this PR (a
#      review-comment suggestion or a fallback diff comment, both posted as
#      github-actions[bot]) and reuses it if it still applies; otherwise
#      re-diagnoses via /gh-fix-ci,
#   4. implements and verifies the fix (tests/build) before committing,
#   5. commits and pushes straight to the PR branch so its checks re-run,
#   6. comments back with what changed and the approximate Claude cost of
#      this run.
#
# Only works for PRs from this repo (not forks): GITHUB_TOKEN cannot push to
# a fork's branch, so for fork PRs Claude will say so and stop rather than
# fail silently.
#
# Requires the Claude GitHub App (https://github.com/apps/claude) installed on
# this repo, plus a CLAUDE_CODE_OAUTH_TOKEN (or ANTHROPIC_API_KEY) repository
# secret. See https://github.com/anthropics/claude-code-action#quickstart.
#
# Only users with write access to the repo can trigger this action (enforced
# by claude-code-action itself) — see its docs/security.md.
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read
  id-token: write

jobs:
  apply-fix:
    # issue_comment fires for comments on issues too; pull_request is only set
    # for PR comments, so this keeps the trigger PR-only.
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude apply fix')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: React to triggering comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

      - name: Checkout PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ github.event.issue.number }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Diagnose and apply the CI fix with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude apply fix"
          additional_permissions: |
            actions: read
          prompt: |
            /caveman
            /gh-fix-ci

            This is a one-shot, non-interactive run: there is no live session
            to deliver a background-task notification to, so any Agent/Task
            tool call you make in background mode will never resume. Run
            every sub-agent in the foreground (run_in_background: false) and
            wait for its result in-line before continuing.

            @${{ github.event.comment.user.login }} approved applying a CI
            fix directly to PR #${{ github.event.issue.number }} in
            ${{ github.repository }} via this comment:
            ${{ github.event.comment.html_url }}

            You are already on the PR's own branch (checked out by this
            job) — NOT a new branch. Follow these steps in order:

            1. Comment on PR #${{ github.event.issue.number }} (via `gh pr
               comment`) acknowledging that you're starting now, referencing
               the triggering comment.
            2. Look for a fix this bot already proposed on this PR, so you
               apply what the approver actually reviewed rather than
               re-deriving something different:
               a. `gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/comments`
                  for a prior review comment from `github-actions[bot]`
                  containing a \`\`\`suggestion block.
               b. `gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments`
                  for a prior fallback comment from `github-actions[bot]`
                  describing a multi-file diff/patch it couldn't post as a
                  suggestion.
               If you find one and it still applies cleanly to the current
               branch tip (nothing since has changed the same lines/files in
               a conflicting way) and the check it targeted is still failing,
               use that exact fix as your starting point instead of
               re-diagnosing from scratch.
            3. If no prior suggestion exists, or the one you found is stale
               (doesn't apply anymore, or the failure has changed), follow
               the /gh-fix-ci skill's steps 1-5 (verify gh auth, resolve the
               PR, inspect the failing GitHub Actions check(s), scope out any
               non-Actions checks, summarize the failure) to diagnose it
               fresh. If all checks are now passing (e.g. already fixed
               another way), say so in a `gh pr comment` and stop — do not
               invent a fix.
            4. Implement the fix (the reused one or the freshly-diagnosed
               one), then verify it locally (e.g. `./gradlew test`, or the
               narrowest relevant test/build command) before committing — do
               not commit an unverified fix.
            5. Commit your changes to the current branch with a clear
               message, then `git push` (no `--force`) to update the PR
               branch directly. Do NOT create a new branch and do NOT open a
               new pull request.
            6. Comment on PR #${{ github.event.issue.number }} (via `gh pr
               comment`) summarizing what changed and why, noting that CI
               will re-run automatically on the push.

            If you get blocked — you can't reproduce the failure, the fix
            isn't safe to verify locally, or `git push` fails (for example
            because this is a fork PR and the token lacks write access to
            it) — stop, comment on the PR explaining what's blocking you, and
            do not force anything.
          show_full_output: true
          claude_args: |
            --model claude-haiku-4-5-20251001
            --max-turns 75
            --allowedTools "Skill,Read,Edit,MultiEdit,Write,Glob,Grep,Bash"

      - name: Post Claude cost estimate
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          result=$(jq -c '.[-1] | select(.type == "result")' "$EXECUTION_FILE" 2>/dev/null || true)
          if [ -z "$result" ]; then
            echo "No result message in execution file; skipping cost comment."
            exit 0
          fi

          cost=$(echo "$result" | jq -r '.total_cost_usd // empty')
          if [ -z "$cost" ]; then
            echo "No total_cost_usd in result; skipping cost comment."
            exit 0
          fi
          turns=$(echo "$result" | jq -r '.num_turns // "?"')
          duration_ms=$(echo "$result" | jq -r '.duration_ms // 0')
          duration_s=$(awk "BEGIN { printf \"%.1f\", ${duration_ms} / 1000 }")
          cost_fmt=$(awk "BEGIN { printf \"%.4f\", ${cost} }")

          body=$(printf '%s\n\n%s' \
            "🧮 **Claude CI-fix cost (approximate):** \$${cost_fmt} USD · ${turns} turns · ${duration_s}s" \
            "Anthropic's self-reported cost for this automated apply-fix run only (not the whole PR's Claude usage). Actual billing may differ slightly, e.g. from prompt-cache discounts.")
          gh pr comment "${{ github.event.issue.number }}" --body "$body"
