name: Claude Apply CI Fix

# Triggered by a comment on a PR containing the trigger phrase
# "@claude apply fix". This is the "human picks which fixes to take" step for
# claude-fix-ci.yml's suggestions, but done through a real git push so CI
# actually re-runs — unlike GitHub's native "Commit suggestion" button, whose
# web-flow commit does not reliably dispatch pull_request/push events here.
#
# The approver selects fixes by reacting 👍 to the individual suggestion
# comments claude-fix-ci.yml posted, then commenting "@claude apply fix".
# Claude then:
#   1. acknowledges on the PR that it's starting,
#   2. checks out the PR's OWN branch (not a new one — this amends the
#      existing PR, unlike claude-implement.yml which opens a fresh PR),
#   3. finds the suggestion comments the approver marked with 👍 and applies
#      ONLY those, verbatim (it never re-derives or "improves" them), leaving
#      them as uncommitted edits — a later step in this same job commits and
#      pushes them (see below for why Claude doesn't do this part itself),
#   4. comments back with which suggestions were applied and the approximate
#      Claude cost of this run.
#
# The push MUST NOT be authenticated as the automatic GITHUB_TOKEN, or
# GitHub's anti-recursion protection silently drops the resulting
# pull_request/push event and CI never re-runs. A fine-grained PAT was tried
# first (PR #67/#68) and did NOT work either — even a fully manual `git push`
# with the PAT embedded directly in the remote URL, run from inside this job,
# never triggered CI, while the exact same push run from *outside* any
# Actions job (e.g. a human's machine) worked immediately. That points at a
# GitHub Actions installation access token (minted from a GitHub App, not a
# personal access token) as the mechanism that's actually documented to
# behave differently here. This workflow mints one at runtime from the
# CI_APP_ID / CI_APP_PRIVATE_KEY secrets (a small GitHub App installed on
# this repo only, with Contents: read/write + Pull requests: read/write) via
# actions/create-github-app-token.
#
# Claude itself never runs `git commit`/`git push` here: even when a working
# push credential was passed as claude-code-action's `github_token`, a push
# performed *by the action* did not trigger CI in testing (see PR #68) — the
# action's internal git/credential handling for its own commits is opaque.
# Claude only edits files; the plain "Commit and push the applied fix" step
# below does the actual `git commit`/`git push`, using the minted App token
# directly. Its git commit author is set to `claude[bot]` (the Claude GitHub
# App's identity, cosmetic only) for visual consistency with the rest of this
# CI-fix flow, even though the push itself authenticates as this repo's own
# separate App installation, not Anthropic's Claude App.
#
# Only works for PRs from this repo (not forks): an installation token can't
# push to a fork's branch, so for fork PRs Claude will say so and stop rather
# than fail silently.
#
# Requires the Claude GitHub App (https://github.com/apps/claude) installed on
# this repo, plus a CLAUDE_CODE_OAUTH_TOKEN (or ANTHROPIC_API_KEY) repository
# secret, and the CI_APP_ID / CI_APP_PRIVATE_KEY secrets described above.
#
# Only users with write access to the repo can trigger this action (enforced
# by claude-code-action itself) — see its docs/security.md.
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read
  id-token: write

jobs:
  apply-fix:
    # issue_comment fires for comments on issues too; pull_request is only set
    # for PR comments, so this keeps the trigger PR-only.
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude apply fix')
    runs-on: ubuntu-latest
    steps:
      - name: Mint a GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Use the minted App token (not GITHUB_TOKEN) so the resulting push
          # is NOT dropped by GitHub's anti-recursion protection and CI re-runs.
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: React to triggering comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

      - name: Comment with apply-fix job link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.issue.number }} \
            --body "🔧 Claude apply-fix started — follow progress at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Checkout PR branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr checkout ${{ github.event.issue.number }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Diagnose and apply the CI fix with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use the minted App token (not the ambient GITHUB_TOKEN) for every
          # gh/API call Claude makes here (it no longer pushes itself — see
          # the file-level comment above).
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@claude apply fix"
          additional_permissions: |
            actions: read
          prompt: |
            /caveman
            /gh-fix-ci

            This is a one-shot, non-interactive run: there is no live session
            to deliver a background-task notification to, so any Agent/Task
            tool call you make in background mode will never resume. Run
            every sub-agent in the foreground (run_in_background: false) and
            wait for its result in-line before continuing.

            @${{ github.event.comment.user.login }} approved applying a CI
            fix directly to PR #${{ github.event.issue.number }} in
            ${{ github.repository }} via this comment:
            ${{ github.event.comment.html_url }}

            You are already on the PR's own branch (checked out by this
            job) — NOT a new branch. This job pushes with a GitHub App
            installation token, not the automatic GITHUB_TOKEN, so a push
            here re-runs the PR's CI automatically. A prior workflow step has
            already posted a comment on the PR linking to this run — do NOT post
            another "starting" comment. Follow these steps in order:

            1. Find which fixes @${{ github.event.comment.user.login }}
               selected. claude-fix-ci.yml posts each proposed fix as a PR
               review comment containing a \`\`\`suggestion block. The
               approver picks the ones they want by reacting 👍 to those
               comments. List them and read each one's reactions:
                 gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/comments \
                   --jq '.[] | {id, path, line, body}'
                 gh api repos/${{ github.repository }}/pulls/comments/<COMMENT_ID>/reactions \
                   --jq '.[] | select(.content=="+1") | .user.login'
               A suggestion is APPROVED if
               @${{ github.event.comment.user.login }} is among its 👍 (+1)
               reactors. Only consider suggestion comments from this repo's
               CI-fix automation — ignore unrelated review threads.
            2. If NO suggestion carries the approver's 👍, do not guess or
               invent a fix: post a `gh pr comment` asking them to react 👍 to
               the specific suggestion(s) they want and then re-comment
               "@claude apply fix", and stop. Likewise, if the checks those
               suggestions targeted are already green, say so and stop.
            3. Apply ONLY the approved suggestions, exactly as written —
               verbatim. Do NOT re-derive, combine, reformat, or "improve"
               them; the approver reviewed that exact text. Apply each
               suggestion's replacement to the current content of its file
               (match by the surrounding lines, since the branch tip may have
               moved since the suggestion was posted). If an approved
               suggestion no longer applies cleanly (its target lines have
               since changed in a conflicting way), do not force it: comment
               explaining that it's stale and stop. You MAY run a quick local
               build/test (e.g. `./gradlew test`) as a courtesy, but CI is the
               authority — never alter an approved suggestion just to make a
               local build pass; note any concern in your summary instead.
            4. Do NOT run `git add`, `git commit`, `git push`, or any other
               git write command yourself. Leave the applied change(s) as
               uncommitted edits in the working tree — a later step in this
               same job commits and pushes them for you (using a token
               confirmed to reliably re-trigger CI, unlike git operations run
               from inside this action). Do NOT create a new branch and do
               NOT open a new pull request.
            5. Comment on PR #${{ github.event.issue.number }} (via `gh pr
               comment`) summarizing exactly which suggestions you applied,
               noting that this job will commit and push them automatically
               right after you finish, which will re-run CI.

            If you get blocked — no suggestion carries the approver's 👍, or
            the approved suggestion is stale — stop, comment on the PR
            explaining what's blocking you, and do not force anything. Do not
            worry about push failures (e.g. a fork PR lacking write access):
            that happens in a later step outside your control, and will be
            visible in the job's own logs if it fails.
          show_full_output: true
          claude_args: |
            --model claude-haiku-4-5-20251001
            --max-turns 75
            --allowedTools "Skill,Read,Edit,MultiEdit,Write,Glob,Grep,Bash"

      # Does the actual commit/push instead of Claude (see the file-level
      # comment above for why) — explicitly re-embeds the minted App token in
      # the remote URL so this push is unambiguously not GITHUB_TOKEN-
      # authenticated, regardless of what credential earlier steps left
      # configured. Commit author is set to claude[bot] purely for display
      # consistency with the rest of this CI-fix flow — see the file-level
      # comment above.
      - name: Commit and push the applied fix
        if: steps.claude.outcome == 'success'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No file changes from Claude — nothing to commit (it likely stopped early, e.g. no suggestion was approved). See its PR comment for why."
            exit 0
          fi
          git config user.name "claude[bot]"
          git config user.email "41898282+claude[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -m "Apply approved CI-fix suggestion(s) via @claude apply fix

          Requested by @${{ github.event.comment.user.login }}: ${{ github.event.comment.html_url }}"
          git push

      - name: Post Claude cost estimate
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          # Deterministic telemetry comment — posts as github-actions[bot] via
          # GITHUB_TOKEN, consistent with the cost comments in the other
          # workflows. (Claude's own comments in this job use the CI-App token.)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          result=$(jq -c '.[-1] | select(.type == "result")' "$EXECUTION_FILE" 2>/dev/null || true)
          if [ -z "$result" ]; then
            echo "No result message in execution file; skipping cost comment."
            exit 0
          fi

          cost=$(echo "$result" | jq -r '.total_cost_usd // empty')
          if [ -z "$cost" ]; then
            echo "No total_cost_usd in result; skipping cost comment."
            exit 0
          fi
          turns=$(echo "$result" | jq -r '.num_turns // "?"')
          duration_ms=$(echo "$result" | jq -r '.duration_ms // 0')
          duration_s=$(awk "BEGIN { printf \"%.1f\", ${duration_ms} / 1000 }")
          cost_fmt=$(awk "BEGIN { printf \"%.4f\", ${cost} }")

          body=$(printf '%s\n\n%s' \
            "🧮 **Claude CI-fix cost (approximate):** \$${cost_fmt} USD · ${turns} turns · ${duration_s}s" \
            "Anthropic's self-reported cost for this automated apply-fix run only (not the whole PR's Claude usage). Actual billing may differ slightly, e.g. from prompt-cache discounts.")
          gh pr comment "${{ github.event.issue.number }}" --body "$body" \
            || echo "Cost comment failed to post; continuing without failing the job."
