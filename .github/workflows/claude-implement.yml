name: Claude Implement Issue

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  implement:
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@claude implement this')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: React to triggering comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

      - name: Implement issue with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude implement this"
          prompt: |
            /caveman
            /implement

            This is a one-shot, non-interactive run: there is no live session to
            deliver a background-task notification to, so any Agent/Task tool
            call you make in the background mode will never resume. Run every
            sub-agent in the foreground (run_in_background: false) and wait for its result
            in-line before continuing.

            @${{ github.event.comment.user.login }} asked you to implement issue
            #${{ github.event.issue.number }} in ${{ github.repository }} via this
            comment: ${{ github.event.comment.html_url }}

            ISSUE TITLE: ${{ github.event.issue.title }}
            ISSUE BODY:
            ${{ github.event.issue.body }}

            Follow these steps in order:

            1. Comment on issue #${{ github.event.issue.number }} (via `gh issue
               comment`) acknowledging that you are starting the implementation
               now. Link to THIS workflow run so the reader can follow progress —
               ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
               — do NOT link back to the triggering comment (that points at
               itself and is useless).
            2. Create and check out a new branch named
               `claude/implement-issue-${{ github.event.issue.number }}` off the
               current branch.
            3. Implement the issue as described above, following the /implement
               skill's process (TDD where possible at pre-agreed seams; run
               typechecking and single test files as you go; run the full test
               suite). Commit your work to that branch.
            4. Push the branch to origin. This push may be REJECTED for a
               permissions reason even though your change is legitimate — most
               commonly GitHub's "refusing to allow a GitHub App to create or
               update workflow `.github/workflows/...` without workflows
               permission". That can fire even when you changed NO workflow file,
               if a workflow file was recently added or modified on the default
               branch (the push token here lacks the `workflows` permission). If
               the push is rejected for such a reason, do NOT keep retrying and
               do NOT try to alter or delete workflow files to get around it —
               skip straight to step 6 and report it.
            5. If the push succeeded, open a pull request with `gh pr create`
               targeting the repository's default branch. The PR body must
               include, in this order:
               a. A "## Implementation started" section acknowledging that work
                  began at ${{ github.event.comment.created_at }} in response to
                  ${{ github.event.comment.html_url }} (issue
                  #${{ github.event.issue.number }}).
               b. A "## What changed" section summarizing the implementation and
                  the files touched.
               c. A "## Testing" section summarizing what you ran to verify it and
                  the results.
               d. `Closes #${{ github.event.issue.number }}`.
            6. Comment on issue #${{ github.event.issue.number }} with the
               outcome — always leave a comment, never end on a raw error:
               - If the PR opened: a short note with its number (e.g. `#123`,
                 which GitHub auto-links to the PR — do NOT also paste the full
                 URL, to avoid a duplicate link to the same PR).
               - If the branch pushed but `gh pr create` failed (e.g. a
                 permissions error): give the pushed branch name
                 (`claude/implement-issue-${{ github.event.issue.number }}`) and
                 ask a maintainer to open the PR from it manually.
               - If the PUSH itself was rejected (so the branch never reached
                 GitHub and is lost when this run ends): say so plainly, name the
                 branch you committed to, list the files you changed with a short
                 summary, AND paste the full diff (`git diff <base>...HEAD`) in a
                 fenced ```diff block so the work isn't lost — a maintainer can
                 apply it, or grant the push token the `workflows` permission and
                 re-run. Do NOT present the work as merged or as an open PR when
                 it isn't.

            If the issue is too vague to implement or you get blocked before you
            have a change worth pushing, stop, comment on the issue explaining
            what's missing, and do not open a PR.
          show_full_output: true
          claude_args: |
            --model claude-haiku-4-5-20251001
            --max-turns 75
            --allowedTools "Skill,Read,Edit,MultiEdit,Write,Glob,Grep,Bash"

      - name: Post Claude cost estimate
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          # claude-code-action revokes its minted App token when its step ends,
          # so steps.claude.outputs.github_token 401s here — this telemetry
          # comment therefore posts as github-actions[bot] via GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          result=$(jq -c '.[-1] | select(.type == "result")' "$EXECUTION_FILE" 2>/dev/null || true)
          if [ -z "$result" ]; then
            echo "No result message in execution file; skipping cost comment."
            exit 0
          fi

          cost=$(echo "$result" | jq -r '.total_cost_usd // empty')
          if [ -z "$cost" ]; then
            echo "No total_cost_usd in result; skipping cost comment."
            exit 0
          fi
          turns=$(echo "$result" | jq -r '.num_turns // "?"')
          duration_ms=$(echo "$result" | jq -r '.duration_ms // 0')
          duration_s=$(awk "BEGIN { printf \"%.1f\", ${duration_ms} / 1000 }")
          cost_fmt=$(awk "BEGIN { printf \"%.4f\", ${cost} }")

          body=$(printf '%s\n\n%s' \
            "🧮 **Claude implement cost (approximate):** \$${cost_fmt} USD · ${turns} turns · ${duration_s}s" \
            "Anthropic's self-reported cost for this automated implementation only. Actual billing may differ slightly, e.g. from prompt-cache discounts.")
          gh issue comment "${{ github.event.issue.number }}" --body "$body" \
            || echo "Cost comment failed to post; continuing without failing the job."