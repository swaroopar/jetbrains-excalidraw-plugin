name: Claude Fix CI

# Triggered whenever one of our CI workflows finishes with a failure on a
# pull request. Diagnosis is gated to run only once per commit even though
# multiple workflows can fail from the same root cause (e.g. a compile break
# fails both Build Plugin and runIde smoke test):
#
#   - Trigger is workflow_run, NOT check_suite: check_suite never fires for
#     check suites GitHub Actions itself created (an anti-recursion rule —
#     see "Automatic check suite created by GitHub Actions" in GitHub's
#     events-that-trigger-workflows docs), which is every check in this repo.
#     workflow_run fires once per finished workflow instead.
#   - The `gate` job below asks the Checks API whether every check run for
#     this commit has reached a terminal (`completed`) state yet. If another
#     check for the same commit is still running, this completion is NOT the
#     last one — skip, and let whichever workflow_run finishes last do the
#     diagnosis (by then everything, including this failure, is visible via
#     `gh pr checks`).
#   - The concurrency group + cancel-in-progress is a second guard for the
#     rarer case where two workflows finish close enough together that both
#     see "all completed" — the later one starting cancels the earlier one
#     if it's still running.
#
# Claude then:
#   1. diagnoses the failing check(s) via the /gh-fix-ci skill (gh CLI, run
#      logs),
#   2. drafts the smallest fix, and posts it as a PR review comment using
#      GitHub's ```suggestion syntax so the author can click "Commit
#      suggestion" to accept it, or just ignore it — Claude never pushes a
#      commit or opens a PR itself (contents: read below, no write access),
#   3. posts a second comment with the approximate Anthropic-reported cost of
#      this run.
#
# workflow_run only populates `pull_requests` for same-repo PRs (not forks),
# so forked-PR failures are skipped rather than guessed at.
#
# Requires the Claude GitHub App (https://github.com/apps/claude) installed on
# this repo, plus a CLAUDE_CODE_OAUTH_TOKEN (or ANTHROPIC_API_KEY) repository
# secret. See https://github.com/anthropics/claude-code-action#quickstart.
#
# The suggestion comment is posted using the CI_FIX_SUGGESTION_TOKEN secret
# (a PAT or GitHub App installation token), NOT the default GITHUB_TOKEN:
# GitHub does not dispatch a new pull_request/push event for commits whose
# provenance traces back to the repo's automatic GITHUB_TOKEN (anti-recursion
# protection, see https://github.com/orgs/community/discussions/65321), which
# meant clicking "Apply suggestion" on this bot's comment silently never
# triggered CI to re-run. See docs/setup.md's github_token input.
on:
  workflow_run:
    workflows: ["Build Plugin", "runIde smoke test"]
    types: [completed]

concurrency:
  group: claude-fix-ci-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  checks: read
  id-token: write

jobs:
  gate:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check whether this commit's other checks are still running
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pending=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/check-runs" --paginate \
            --jq '[.check_runs[] | select(.status != "completed")] | length')
          echo "Checks still running for this commit: $pending"
          if [ "$pending" -gt 0 ]; then
            echo "Not the last check to finish for this commit — a later workflow_run completion will trigger diagnosis instead."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  suggest-fix:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Diagnose failure and suggest a fix with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Overrides the action's default token (the ambient GITHUB_TOKEN)
          # for its own gh/API calls, so the suggestion comment it posts
          # below isn't attributed to GITHUB_TOKEN — see the `on:` comment
          # above for why that matters.
          github_token: ${{ secrets.CI_FIX_SUGGESTION_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            /caveman
            /gh-fix-ci

            This is a one-shot, non-interactive run: there is no live session
            and no human available to approve a plan mid-run, and any
            Agent/Task tool call you make in background mode will never
            resume. Run every sub-agent in the foreground
            (run_in_background: false).

            One or more CI checks failed for PR #${{ env.PR_NUMBER }} in
            ${{ github.repository }} at commit ${{ env.HEAD_SHA }}. There may
            be more than one failing check for this same commit (e.g. the
            same compile error can fail both the build and the smoke-test
            workflows) — treat them as one underlying failure to diagnose and
            fix once, not once per check.

            Follow the /gh-fix-ci skill's steps 1-5 (verify gh auth, resolve
            the PR, inspect ALL failing GitHub Actions checks for this PR via
            `gh pr checks`, scope out any non-Actions checks, summarize the
            failure(s)) against PR #${{ env.PR_NUMBER }}. Then deviate from
            the skill for the remaining steps as follows, because there is no
            one to approve a plan and you must not modify anything yourself:

              - Do NOT wait for approval, do NOT edit files, do NOT commit,
                and do NOT open a PR. You only have read access to repo
                contents in this job.
              - You may run local commands (e.g. `./gradlew test`,
                `./gradlew build`) read-only to reproduce/confirm the failure
                and validate your proposed fix in your head, but discard any
                local edits you make for that purpose — never commit them.
              - Draft the smallest fix that would make the failing check(s)
                pass. If multiple checks are failing for the same root cause,
                draft one fix and say so; only draft more than one fix if the
                failures are genuinely unrelated.
              - If the fix is a contiguous change to a single existing file,
                post it as a suggestion the author can accept with one click:
                  gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/comments \
                    -f body="<1-2 sentence explanation of the failure and fix>

                  \`\`\`suggestion
                  <replacement lines, exactly as they should read after the fix>
                  \`\`\`" \
                    -f commit_id="${{ env.HEAD_SHA }}" \
                    -f path="<repo-relative file path>" \
                    -F line=<last line number of the range being replaced> \
                    -F start_line=<first line number of the range being replaced> \
                    -f start_side="RIGHT" \
                    -f side="RIGHT"
                (omit start_line/start_side entirely for a single-line fix).
                Get path/line numbers from the file as it exists at
                ${{ env.HEAD_SHA }} in this checkout. Mention in the comment
                that replying "@claude apply fix" on this PR will have Claude
                push this fix directly instead, if preferred.
              - If the fix can't be expressed as one suggestion block (spans
                multiple files, adds/deletes a file, etc.), instead post a
                `gh pr comment ${{ env.PR_NUMBER }}` with a clear diff/patch
                in a fenced code block and an explanation, and say explicitly
                that it needs to be applied manually — or that replying
                "@claude apply fix" on this PR will have Claude push it
                directly.
              - If you can't determine an actionable fix (inconclusive logs,
                a flaky/infra failure, or a non-GitHub-Actions check), post a
                `gh pr comment ${{ env.PR_NUMBER }}` explaining what's missing
                instead of guessing.
              - Post at most one suggestion/diff comment and one "can't
                determine a fix" comment for this run — do not post once per
                failing check.
          show_full_output: true
          claude_args: |
            --max-turns 60
            --allowedTools "Skill,Read,Grep,Glob,Bash"

      - name: Post Claude cost estimate
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          result=$(jq -c '.[-1] | select(.type == "result")' "$EXECUTION_FILE" 2>/dev/null || true)
          if [ -z "$result" ]; then
            echo "No result message in execution file; skipping cost comment."
            exit 0
          fi

          cost=$(echo "$result" | jq -r '.total_cost_usd // empty')
          if [ -z "$cost" ]; then
            echo "No total_cost_usd in result; skipping cost comment."
            exit 0
          fi
          turns=$(echo "$result" | jq -r '.num_turns // "?"')
          duration_ms=$(echo "$result" | jq -r '.duration_ms // 0')
          duration_s=$(awk "BEGIN { printf \"%.1f\", ${duration_ms} / 1000 }")
          cost_fmt=$(awk "BEGIN { printf \"%.4f\", ${cost} }")

          body=$(printf '%s\n\n%s' \
            "🧮 **Claude CI-fix cost (approximate):** \$${cost_fmt} USD · ${turns} turns · ${duration_s}s" \
            "Anthropic's self-reported cost for this automated CI-fix run only (not the whole PR's Claude usage). Actual billing may differ slightly, e.g. from prompt-cache discounts.")
          gh pr comment "${{ env.PR_NUMBER }}" --body "$body"
